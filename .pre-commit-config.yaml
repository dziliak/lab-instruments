default_install_hook_types:
  - pre-commit
  - pre-push

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
        args: ["--maxkb=1000"]

      - id: check-case-conflict

      - id: check-merge-conflict

      - id: check-toml

      - id: check-yaml

      - id: debug-statements

      - id: end-of-file-fixer

      - id: mixed-line-ending
        args: ["--fix=lf"]

      - id: trailing-whitespace

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.22
    hooks:
      - id: ruff-check
        args: ["--fix"]

      - id: ruff-format

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args:
          - "--baseline"
          - ".secrets.baseline"
        exclude:
          (?x)^(
              uv\.lock
          )$

  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: uv run pytest -m "not device"
        language: system
        pass_filenames: false
        stages: [pre-push]
